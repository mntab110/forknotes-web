<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password - ForkNotes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --orange: #F26522; --orange-dark: #d4551a;
      --cream: #FDF8F3; --ink: #1a1208; --ink-soft: #5a4a38;
      --ink-muted: #a0907e; --error: #c0392b;
    }
    html, body { min-height: 100%; font-family: 'DM Sans', sans-serif; background-color: var(--cream); color: var(--ink); }
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0.6;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    }
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding: 20px 40px; display: flex; align-items: center; background: rgba(253,248,243,0.85); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(242,101,34,0.1); }
    .nav-logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
    .nav-icon { width: 40px; height: 40px; background: var(--orange); border-radius: 10px; display: flex; align-items: center; justify-content: center; }
    .nav-icon svg { width: 22px; height: 22px; }
    .nav-wordmark { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 700; color: var(--ink); letter-spacing: -0.02em; }
    .page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 100px 24px 60px; position: relative; z-index: 1; }
    .card { width: 100%; max-width: 420px; background: white; border-radius: 24px; padding: 48px 40px; box-shadow: 0 4px 6px rgba(26,18,8,0.04), 0 24px 80px rgba(26,18,8,0.08); animation: cardIn 0.7s cubic-bezier(0.22,1,0.36,1) both; }
    @keyframes cardIn { from { opacity: 0; transform: translateY(30px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
    .card-icon { width: 68px; height: 68px; background: var(--orange); border-radius: 18px; display: flex; align-items: center; justify-content: center; margin: 0 auto 28px; box-shadow: 0 12px 32px rgba(242,101,34,0.3); }
    .card-icon svg { width: 36px; height: 36px; }
    h1 { font-family: 'Playfair Display', serif; font-size: 1.85rem; font-weight: 700; text-align: center; color: var(--ink); letter-spacing: -0.025em; margin-bottom: 10px; }
    .card-desc { font-size: 0.9rem; color: var(--ink-muted); text-align: center; line-height: 1.6; margin-bottom: 32px; }
    .top-error { font-size: 0.85rem; color: var(--error); text-align: center; margin-bottom: 16px; display: none; padding: 10px; background: #fdf0ef; border-radius: 8px; }
    .top-error.visible { display: block; }
    .field { margin-bottom: 20px; }
    label { display: block; font-size: 0.82rem; font-weight: 500; color: var(--ink-soft); margin-bottom: 8px; }
    .input-wrap { position: relative; }
    .pw-input { width: 100%; padding: 14px 44px 14px 16px; border: 1.5px solid #ece5dc; border-radius: 12px; background: #faf7f4; font-family: 'DM Sans', sans-serif; font-size: 0.95rem; color: var(--ink); outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
    .pw-input:focus { border-color: var(--orange); box-shadow: 0 0 0 3px rgba(242,101,34,0.12); background: white; }
    .pw-input.error { border-color: var(--error) !important; box-shadow: 0 0 0 3px rgba(192,57,43,0.1) !important; }
    .toggle-pw { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--ink-muted); padding: 2px; display: flex; align-items: center; transition: color 0.2s; }
    .toggle-pw:hover { color: var(--orange); }
    .strength-wrap { margin-top: 10px; display: none; }
    .strength-wrap.visible { display: block; }
    .strength-bars { display: flex; gap: 5px; margin-bottom: 5px; }
    .strength-bar { flex: 1; height: 3px; border-radius: 2px; background: #ece5dc; transition: background 0.3s; }
    .strength-bar.active-weak { background: #e74c3c; }
    .strength-bar.active-medium { background: #f39c12; }
    .strength-bar.active-strong { background: #27ae60; }
    .strength-label { font-size: 0.75rem; }
    .field-error { font-size: 0.78rem; color: var(--error); margin-top: 6px; display: none; }
    .field-error.visible { display: block; }
    .btn-submit { width: 100%; padding: 16px; background: var(--orange); color: white; border: none; border-radius: 14px; font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 500; cursor: pointer; margin-top: 8px; transition: background 0.2s, transform 0.1s, box-shadow 0.2s; position: relative; overflow: hidden; }
    .btn-submit:hover:not(:disabled) { background: var(--orange-dark); box-shadow: 0 8px 24px rgba(242,101,34,0.3); }
    .btn-submit:active:not(:disabled) { transform: scale(0.99); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-spinner { display: none; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); }
    @keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }
    .back-link { display: block; text-align: center; margin-top: 20px; font-size: 0.85rem; color: var(--orange); text-decoration: none; font-weight: 500; }
    .back-link:hover { opacity: 0.7; }
    .success-state { display: none; text-align: center; }
    .success-icon { width: 64px; height: 64px; background: #e8f8ee; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
    .success-icon svg { width: 32px; height: 32px; }
    .success-state h2 { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--ink); margin-bottom: 12px; }
    .success-state p { font-size: 0.9rem; color: var(--ink-muted); line-height: 1.6; }
    .btn-login { display: inline-block; margin-top: 24px; padding: 14px 32px; background: var(--orange); color: white; border-radius: 12px; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 500; text-decoration: none; }
    .btn-login:hover { background: var(--orange-dark); }
    @media (max-width: 480px) { .card { padding: 36px 24px; } nav { padding: 16px 20px; } }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="/">
    <div class="nav-icon">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M6 2v4c0 1.1.9 2 2 2h1v14h2V8h1c1.1 0 2-.9 2-2V2h-2v3H8V2H6z" fill="white"/>
        <path d="M16 2v6l1.5 1.5V22h2V9.5L21 8V2h-2v5h-1V2h-2z" fill="white"/>
      </svg>
    </div>
    <span class="nav-wordmark">ForkNotes</span>
  </a>
</nav>

<main class="page">
  <div class="card">

    <div id="formState">
      <div class="card-icon">
        <svg viewBox="0 0 24 24" fill="none">
          <rect x="3" y="11" width="18" height="12" rx="3" stroke="white" stroke-width="2" fill="none"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4" stroke="white" stroke-width="2" stroke-linecap="round"/>
          <circle cx="12" cy="17" r="1.5" fill="white"/>
        </svg>
      </div>
      <h1>Reset Password</h1>
      <p class="card-desc">Create a new secure password for your ForkNotes account.</p>
      <p class="top-error" id="topError"></p>

      <div class="field">
        <label for="newPassword">New Password</label>
        <div class="input-wrap">
          <input class="pw-input" type="password" id="newPassword" placeholder="Enter new password" autocomplete="new-password" />
          <button class="toggle-pw" id="toggleNew" type="button" aria-label="Show password">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M1 12S5 4 12 4s11 8 11 8-4 8-11 8S1 12 1 12z" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/></svg>
          </button>
        </div>
        <div class="strength-wrap" id="strengthWrap">
          <div class="strength-bars">
            <div class="strength-bar" id="bar1"></div>
            <div class="strength-bar" id="bar2"></div>
            <div class="strength-bar" id="bar3"></div>
          </div>
          <span class="strength-label" id="strengthLabel"></span>
        </div>
        <div class="field-error" id="pwError">Please enter a password with at least 8 characters.</div>
      </div>

      <div class="field">
        <label for="confirmPassword">Confirm Password</label>
        <div class="input-wrap">
          <input class="pw-input" type="password" id="confirmPassword" placeholder="Confirm new password" autocomplete="new-password" />
          <button class="toggle-pw" id="toggleConfirm" type="button" aria-label="Show password">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M1 12S5 4 12 4s11 8 11 8-4 8-11 8S1 12 1 12z" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/></svg>
          </button>
        </div>
        <div class="field-error" id="confirmError">Passwords do not match.</div>
      </div>

      <button class="btn-submit" id="submitBtn" type="button">
        <span id="btnText">Reset Password</span>
        <div class="btn-spinner" id="btnSpinner"></div>
      </button>

      <a href="/" class="back-link">Back to Home</a>
    </div>

    <div class="success-state" id="successState">
      <div class="success-icon">
        <svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#27ae60" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <h2>Password Updated!</h2>
      <p>Your password has been reset. You can now log back into ForkNotes.</p>
      <a href="/" class="btn-login">Back to Home</a>
    </div>

  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function () {
  var SUPABASE_URL  = 'https://npaszheuxcxoivelrlyq.supabase.co';
  var SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5wYXN6aGV1eGN4b2l2ZWxybHlxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk0NTk5OTcsImV4cCI6MjA4NTAzNTk5N30.WeHsmZqqvlRWyWllroEjDA0oM746XpvfFux1BN6czQA';
  var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  function showTopError(msg) {
    var el = document.getElementById('topError');
    el.textContent = msg;
    el.classList.add('visible');
  }

  function toggleVisibility(inputId) {
    var input = document.getElementById(inputId);
    input.type = input.type === 'password' ? 'text' : 'password';
  }

  function checkStrength() {
    var val   = document.getElementById('newPassword').value;
    var wrap  = document.getElementById('strengthWrap');
    var label = document.getElementById('strengthLabel');
    var bars  = [document.getElementById('bar1'), document.getElementById('bar2'), document.getElementById('bar3')];
    if (!val) { wrap.classList.remove('visible'); return; }
    wrap.classList.add('visible');
    var score = (val.length >= 8 ? 1 : 0) + ((/[A-Z]/.test(val) || /[0-9]/.test(val)) ? 1 : 0) + (/[^a-zA-Z0-9]/.test(val) ? 1 : 0);
    bars.forEach(function(b) { b.className = 'strength-bar'; });
    if (score >= 1) bars[0].classList.add(score === 1 ? 'active-weak' : score === 2 ? 'active-medium' : 'active-strong');
    if (score >= 2) bars[1].classList.add(score === 2 ? 'active-medium' : 'active-strong');
    if (score >= 3) bars[2].classList.add('active-strong');
    label.textContent = score === 1 ? 'Weak' : score === 2 ? 'Fair' : 'Strong';
    label.style.color = score === 1 ? '#e74c3c' : score === 2 ? '#f39c12' : '#27ae60';
  }

  function clearConfirmError() {
    document.getElementById('confirmPassword').classList.remove('error');
    document.getElementById('confirmError').classList.remove('visible');
  }

  async function initSession() {
    // Log full URL so we can see exactly what Supabase sent
    console.log('Full URL:', window.location.href);
    console.log('Hash:', window.location.hash);
    console.log('Search:', window.location.search);

    var accessToken, refreshToken, type;

    // Try hash first (#access_token=...) — magic link / email OTP flow
    if (window.location.hash) {
      var hashParams = new URLSearchParams(window.location.hash.substring(1));
      accessToken  = hashParams.get('access_token');
      refreshToken = hashParams.get('refresh_token');
      type         = hashParams.get('type');
      console.log('Hash params — type:', type, '| access_token:', accessToken ? 'found' : 'missing');
    }

    // Fallback: try query string (?access_token=...) — some Supabase configs use this
    if (!accessToken && window.location.search) {
      var queryParams = new URLSearchParams(window.location.search);
      accessToken  = queryParams.get('access_token');
      refreshToken = queryParams.get('refresh_token');
      type         = queryParams.get('type');
      console.log('Query params — type:', type, '| access_token:', accessToken ? 'found' : 'missing');
    }

    // Also try token_hash (newer Supabase PKCE-style in query)
    if (!accessToken && window.location.search) {
      var queryParams2 = new URLSearchParams(window.location.search);
      var tokenHash = queryParams2.get('token_hash');
      type          = queryParams2.get('type');
      console.log('token_hash:', tokenHash ? 'found' : 'missing', '| type:', type);
      if (tokenHash && type === 'recovery') {
        var result = await sb.auth.verifyOtp({ token_hash: tokenHash, type: 'recovery' });
        console.log('verifyOtp result:', result);
        if (result.error) { showTopError('Link error: ' + result.error.message); }
        else { console.log('Session ready via token_hash'); }
        return;
      }
    }

    if (!accessToken) {
      showTopError('No reset token found in the URL. Please request a new link.');
      return;
    }

    if (type !== 'recovery') {
      showTopError('Invalid link type "' + type + '". Please request a new password reset link.');
      return;
    }

    var result = await sb.auth.setSession({ access_token: accessToken, refresh_token: refreshToken });
    console.log('setSession result:', result);
    if (result.error) { showTopError('Session error: ' + result.error.message); }
    else { console.log('Session ready via access_token'); }
  }

  async function handleSubmit() {
    console.log('Submit clicked');
    var pw      = document.getElementById('newPassword').value;
    var confirm = document.getElementById('confirmPassword').value;
    var valid   = true;

    if (pw.length < 8) {
      document.getElementById('newPassword').classList.add('error');
      document.getElementById('pwError').classList.add('visible');
      valid = false;
    } else {
      document.getElementById('newPassword').classList.remove('error');
      document.getElementById('pwError').classList.remove('visible');
    }

    if (!confirm || pw !== confirm) {
      document.getElementById('confirmPassword').classList.add('error');
      document.getElementById('confirmError').classList.add('visible');
      valid = false;
    } else {
      document.getElementById('confirmPassword').classList.remove('error');
      document.getElementById('confirmError').classList.remove('visible');
    }

    if (!valid) return;

    var btn     = document.getElementById('submitBtn');
    var btnText = document.getElementById('btnText');
    var spinner = document.getElementById('btnSpinner');
    btn.disabled = true;
    btnText.style.visibility = 'hidden';
    spinner.style.display = 'block';

    console.log('Calling updateUser...');
    var result = await sb.auth.updateUser({ password: pw });
    console.log('Result:', result);

    if (result.error) {
      btn.disabled = false;
      btnText.style.visibility = 'visible';
      spinner.style.display = 'none';
      showTopError(result.error.message || 'Something went wrong. Please try again.');
      return;
    }

    await sb.auth.signOut();
    document.getElementById('formState').style.display = 'none';
    document.getElementById('successState').style.display = 'block';
  }

  document.addEventListener('DOMContentLoaded', function () {
    document.getElementById('newPassword').addEventListener('input', checkStrength);
    document.getElementById('confirmPassword').addEventListener('input', clearConfirmError);
    document.getElementById('submitBtn').addEventListener('click', handleSubmit);
    document.getElementById('toggleNew').addEventListener('click', function () { toggleVisibility('newPassword'); });
    document.getElementById('toggleConfirm').addEventListener('click', function () { toggleVisibility('confirmPassword'); });
    initSession();
  });
})();
</script>
</body>
</html>
